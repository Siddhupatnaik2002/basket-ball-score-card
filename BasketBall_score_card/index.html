<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class = "main-container">
            <div class="container">
            <div class = "score-card">
                <h3 class = "team">HOME</h3>
                <div class="score-container">
                    <h2 class = "score" id = "home-el">0</h2>
                </div>
                <div class="points-container score-font">
                    <button class = "score-button" onclick = "add_1('home')">+1</button>
                    <button class = "score-button" onclick = "add_2('home')">+2</button>
                    <button class = "score-button" onclick = "add_3('home')">+3</button>
                </div>
            </div>
            <div>
                <h3 class = "team">GUEST</h3>
                <div class="score-container">
                    <h2 class ="score" id = "guest-el">0</h2>
                </div>
                <div class="points-container ">
                    <button class = "score-button" onclick = "add_1()">+1</button>
                    <button class = "score-button" onclick = "add_2()">+2</button>
                    <button class = "score-button" onclick = "add_3()">+3</button>
                </div>
            </div>
        </div>
        <div class = "new-game-container">
            <button id = "new-game-button" onclick = "newGame()">New game</button>
        </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
